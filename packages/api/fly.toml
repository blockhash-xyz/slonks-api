# Fly app config for slonks-api.
# Two process groups in one app: `web` serves HTTP, `indexer` runs the chain sync.
# Proof generation is delegated to the separate slonks-prover Fly app.
# Set DATABASE_URL, ALCHEMY_API_KEY as Fly secrets.
#   fly secrets set DATABASE_URL=... ALCHEMY_API_KEY=...

app = "slonks-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[deploy]
  release_command = "bun packages/api/src/db/migrate.ts"

[processes]
  web = "bun packages/api/src/web.ts"
  indexer = "bun packages/api/src/indexer/index.ts"
  proof-worker = "bun packages/api/src/proofWorker.ts"

[env]
  PORT = "8080"
  LOG_RANGE = "100"
  SYNC_INTERVAL_MS = "2000"
  SLOP_REMOTE_PROVER_URL = "https://slonks-prover.fly.dev"
  SLOP_REMOTE_PROVER_TIMEOUT_MS = "45000"
  SLOP_REMOTE_PROVER_BUSY_RETRIES = "12"
  SLOP_REMOTE_PROVER_BUSY_RETRY_MS = "750"
  SLOP_PROOF_WORKER_CONCURRENCY = "4"
  SLOP_PROOF_JOB_POLL_MS = "1000"
  SLOP_PROOF_JOB_STALE_MS = "45000"
  SLOP_PROOF_PENDING_RETRY_MS = "1000"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 2
  processes = ["web"]

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/health"

[[vm]]
  processes = ["web"]
  memory = "8192mb"
  cpu_kind = "performance"
  cpus = 2

[[vm]]
  processes = ["indexer"]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[[vm]]
  processes = ["proof-worker"]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
