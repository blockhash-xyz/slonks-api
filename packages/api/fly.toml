# Fly app config for slonks-api.
# Two process groups in one app: `web` serves HTTP, `indexer` runs the chain sync.
# Set DATABASE_URL, ALCHEMY_API_KEY as Fly secrets.
#   fly secrets set DATABASE_URL=... ALCHEMY_API_KEY=...

app = "slonks-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[deploy]
  release_command = "bun packages/api/src/db/migrate.ts"

[processes]
  web = "bun packages/api/src/web.ts"
  indexer = "bun packages/api/src/indexer/index.ts"

[env]
  PORT = "8080"
  LOG_RANGE = "100"
  SYNC_INTERVAL_MS = "2000"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 2
  processes = ["web"]

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/health"

[[vm]]
  processes = ["web"]
  memory = "8192mb"
  cpu_kind = "performance"
  cpus = 2

[[vm]]
  processes = ["indexer"]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
